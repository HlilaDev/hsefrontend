<div class="login-page">
  <div class="login-left">
    <div class="login-box">
      <div class="logo">
        <img src="assets/images/logo.png" alt="Logo">
      </div>
      
      <h1>{{ 'LOGIN.TITLE' | translate }}</h1>
      <p class="subtitle">{{ 'LOGIN.SUBTITLE' | translate }}</p>

      <div class="social-login">
        <button class="btn-google">
          <img src="assets/icons/google.svg" alt=""> Google
        </button>
        <button class="btn-facebook">
          <img src="assets/icons/facebook.svg" alt=""> Facebook
        </button>
      </div>

      <div class="divider">
        <span>{{ 'LOGIN.OR_WITH' | translate }}</span>
      </div>

      <form>
        <div class="form-group">
          <label>{{ 'LOGIN.USERNAME' | translate }}</label>
          <input type="text" placeholder="admin">
        </div>
        <div class="form-group">
          <label>{{ 'LOGIN.PASSWORD' | translate }}</label>
          <input type="password" placeholder="....">
        </div>
        
        <div class="form-options">
          <label><input type="checkbox"> {{ 'LOGIN.REMEMBER' | translate }}</label>
          <a href="#">{{ 'LOGIN.FORGOT' | translate }}</a>
        </div>

        <button class="btn-signin">{{ 'LOGIN.SIGNIN_BTN' | translate }}</button>
      </form>

      <p class="signup-link">
        {{ 'LOGIN.NEW' | translate }} <a href="#">{{ 'LOGIN.CREATE' | translate }}</a>
      </p>
    </div>
  </div>

  <div class="login-right">
    <div class="welcome-content">
      <h1>{{ 'WELCOME.TITLE' | translate }}</h1>
      <p>{{ 'WELCOME.TEXT' | translate }}</p>
      <button class="btn-learn">{{ 'WELCOME.LEARN_MORE' | translate }}</button>
    </div>
  </div>
</div>
